<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нет соединения - HHBAR</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
        background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
    }
    .offline-container {
        padding: 40px;
        max-width: 500px;
    }
    h1 {
        font-size: 3rem;
        color: #00f3ff;
        margin-bottom: 20px;
    }
    p {
        font-size: 1.2rem;
        color: #aaa;
        margin-bottom: 30px;
    }
    button {
        background: linear-gradient(90deg, #00f3ff, #ff00ff);
        border: none;
        padding: 15px 40px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.3s;
    }
    button:hover {
        transform: translateY(-3px);
    }
</style>
</head>
<body>
<div class="offline-container">
    <h1>🌐 Нет соединения</h1>
    <p>Пожалуйста, проверьте ваше интернет-соединение и попробуйте снова.</p>
    <button onclick="location.reload()">Попробовать снова</button>
</div>
</body>
</html>
